server {
    listen 443 ssl;
    http2 on;

    server_name test.dyna.com;

    ssl_certificate /etc/nginx/ssl/test.dyna.com.crt;
 
   ssl_certificate_key /etc/nginx/ssl/test.dyna.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 64M;

    	proxy_buffer_size 128k;
	proxy_buffers 4 256k;
	proxy_busy_buffers_size 256k;
	large_client_header_buffers 4 16k;

    location /secureadmin/ {
        proxy_pass http://nginx-app:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /static/ {
        proxy_pass http://nginx-app:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /media/ {
        proxy_pass http://nginx-app:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
    }

   
    location /phpmyadmin/ {
    	auth_basic "Restricted Access";
    	auth_basic_user_file /etc/nginx/auth/.htpasswd;

    	proxy_pass http://phpmyadmin:80/;

    	proxy_set_header Host $host;
    	proxy_set_header X-Forwarded-Proto https;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }



    location / {
    	proxy_pass http://varnish:6081;

    	proxy_set_header Host $host;
    	proxy_set_header X-Forwarded-Proto https;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header X-Real-IP $remote_addr;

    	proxy_buffer_size 128k;
    	proxy_buffers 4 256k;
    	proxy_busy_buffers_size 256k;

    	proxy_read_timeout 90;
    	proxy_connect_timeout 90;
    	proxy_send_timeout 90;
    }


}
