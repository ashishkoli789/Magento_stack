services:

  nginx:
    build: ./nginx
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/auth:/etc/nginx/auth:ro
    depends_on:
      - varnish
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - magento-net

  php:
    build: ./php
    container_name: php
    volumes:
      - ./src:/var/www/html
    expose:
      - "9000"
    networks:
      - magento-net
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 30s
      timeout: 10s
      retries: 3

  cron:
    build:
      context: .
      dockerfile: cron/Dockerfile
    container_name: cron

    volumes:
      - ./src:/var/www/html

    depends_on:
      - php
      - mysql
      - redis

    restart: unless-stopped

    networks:
      - magento-net


  mysql:
    image: mysql:8.0.36
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: magento
      MYSQL_USER: magento
      MYSQL_PASSWORD: magento
    command:
      --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s


    networks:
      - magento-net

  redis:
    image: redis:7.2.4
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - magento-net

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - magento-net

  varnish:
    image: varnish:7.5
    container_name: varnish
    volumes:
      - ./varnish/default.vcl:/etc/varnish/default.vcl
    command: >
      varnishd -F
      -a :6081
      -f /etc/varnish/default.vcl
      -s malloc,256m
    depends_on:
      - php
    restart: unless-stopped 
    healthcheck:
      test: ["CMD-SHELL", "varnishadm ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - magento-net

  nginx-app:
    build: ./nginx-app
    container_name: nginx-app
    volumes:
      - ./src:/var/www/html
    depends_on:
      - php
    restart: unless-stopped
    networks:
      - magento-net 
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin

    restart: unless-stopped

    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306

    depends_on:
      - mysql
    networks:
      - magento-net  

networks:
  magento-net:

volumes:
  mysql-data:
  opensearch-data:

